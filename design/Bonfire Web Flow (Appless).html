<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Bonfire · App-less Web Flow</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Source+Serif+4:ital,opsz,wght@0,8..60,400;0,8..60,500;1,8..60,400;1,8..60,500&family=Onest:wght@400;500;600;700&family=Geist+Mono:wght@400;500&display=swap" rel="stylesheet" />
<style>
  html, body { margin: 0; padding: 0; background: #efe7e2; }
  * { -webkit-font-smoothing: antialiased; box-sizing: border-box; }
  button { font: inherit; }

  @keyframes breathe {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.45; transform: scale(0.82); }
  }
  .pulse-dot { animation: breathe 2.4s ease-in-out infinite; }

  @keyframes halo {
    0%, 100% { opacity: 0.5; transform: scale(1); }
    50% { opacity: 0.9; transform: scale(1.18); }
  }
  .halo { animation: halo 3.2s ease-in-out infinite; }

  @keyframes tickerIn {
    0% { opacity: 0; transform: translateY(-4px); }
    100% { opacity: 1; transform: translateY(0); }
  }
  .ticker { animation: tickerIn 0.5s ease-out both; }

  @media (prefers-reduced-motion: reduce) {
    .pulse-dot, .halo, .ticker { animation: none !important; }
  }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="ios-frame.jsx"></script>
<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="bonfire-bits.jsx"></script>
<script type="text/babel" src="bonfire-web.jsx"></script>

<script type="text/babel">
function Frame({ children }) {
  return <IOSDevice width={402} height={874}>{children}</IOSDevice>;
}

function App() {
  return (
    <DesignCanvas>
      <DCSection id="flow" title="Bonfire · App-less Web Flow" subtitle="Tap a pulse link in the group chat with no app — Partiful-style, the link opens straight to the live thing. Open to value, never a download gate. Joining is name-only; the number is optional, only for pings + tracking.">
        <DCArtboard id="s1" label="1 · The link opens — live, no signup to look" width={402} height={874}>
          <Frame><Web1_Live /></Frame>
        </DCArtboard>
        <DCArtboard id="s2" label="2 · Join — name only, instant" width={402} height={874}>
          <Frame><Web2_Join /></Frame>
        </DCArtboard>
        <DCArtboard id="s3" label="3 · Optional — add your number for a ping" width={402} height={874}>
          <Frame><Web3_Number /></Frame>
        </DCArtboard>
        <DCArtboard id="s4" label="4 · Your pulses — web home, keyed to number" width={402} height={874}>
          <Frame><Web4_Home /></Frame>
        </DCArtboard>
        <DCArtboard id="s5" label="5 · Soft prompt to get the app — a nudge" width={402} height={874}>
          <Frame><Web5_AppNudge /></Frame>
        </DCArtboard>
      </DCSection>
    </DesignCanvas>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
